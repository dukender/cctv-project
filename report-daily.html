<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task Log - Professional System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Sarabun', 'sans-serif'] },
                    colors: { primary: '#5b5fc7', secondary: '#4e52b1' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8f9fc; }
        .custom-shadow { box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05); }
        .active-tab { background-color: #eef1ff; color: #5b5fc7; border-left: 4px solid #5b5fc7; }
        .tab-btn { transition: all 0.2s; border-left: 4px solid transparent; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #5b5fc7; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col overflow-hidden">

    <!-- View: Login -->
    <div id="view-login" class="fixed inset-0 bg-[#f0f2f5] z-[1000] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-10 text-center border border-white relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-600 via-purple-500 to-pink-500"></div>
            <div class="w-20 h-20 bg-primary rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-lg rotate-3">
                <i data-lucide="clipboard-check" class="w-10 h-10 text-white -rotate-3"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2">ยินดีต้อนรับ</h1>
            <p class="text-gray-500 mb-10">ระบบบันทึกงานประจำวัน (Daily Task Log)</p>
            
            <div class="space-y-4">
                <button id="btn-login-google" class="w-full flex items-center justify-center gap-4 bg-white border-2 border-gray-100 hover:border-gray-200 hover:bg-gray-50 text-gray-700 font-bold py-4 px-6 rounded-2xl transition-all shadow-sm active:scale-[0.98]">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6" alt="Google">
                    เข้าสู่ระบบด้วย Google
                </button>
                <button id="btn-login-microsoft" class="w-full flex items-center justify-center gap-4 bg-white border-2 border-gray-100 hover:border-gray-200 hover:bg-gray-50 text-gray-700 font-bold py-4 px-6 rounded-2xl transition-all shadow-sm active:scale-[0.98]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 21 21"><path fill="#f25022" d="M0 0h10v10H0z"/><path fill="#7fba00" d="M11 0h10v10H11z"/><path fill="#00a4ef" d="M0 11h10v10H0z"/><path fill="#ffb900" d="M11 11h10v10H11z"/></svg>
                    เข้าสู่ระบบด้วย Microsoft
                </button>
            </div>
            <p class="mt-8 text-xs text-gray-400">Copyright © 2024 CCTV Project Team</p>
        </div>
    </div>

    <!-- Main Application -->
    <div id="main-app" class="hidden h-full flex flex-col">
        <!-- Top Nav -->
        <header class="bg-white border-b px-6 py-3 flex justify-between items-center z-50 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="bg-primary p-2 rounded-lg text-white">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-gray-800">Daily Task <span class="text-primary">Log</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div id="user-info" class="hidden md:flex items-center gap-3 pr-4 border-r">
                    <div class="text-right">
                        <p id="user-name" class="text-sm font-bold leading-none"></p>
                        <p id="user-email" class="text-xs text-gray-500"></p>
                    </div>
                    <img id="user-avatar" class="w-9 h-9 rounded-full border-2 border-primary/20" src="" alt="">
                </div>
                <button id="btn-logout" class="bg-red-50 text-red-600 hover:bg-red-100 p-2 rounded-xl transition-colors">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <!-- Sidebar -->
            <aside class="w-64 bg-white border-r flex flex-col py-6 overflow-y-auto no-scrollbar hidden lg:flex">
                <div class="px-4 mb-6">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-4 mb-2">เมนูหลัก</p>
                    <nav class="space-y-1">
                        <button onclick="switchTab('dashboard')" id="nav-dashboard" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold active-tab">
                            <i data-lucide="bar-chart-3" class="w-5 h-5"></i> แดชบอร์ด
                        </button>
                        <button onclick="switchTab('tasks')" id="nav-tasks" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-gray-500 hover:bg-gray-50">
                            <i data-lucide="list-todo" class="w-5 h-5"></i> รายการงานทั้งหมด
                        </button>
                    </nav>
                </div>

                <div class="px-4 mb-6">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-4 mb-2">รายงานสรุป</p>
                    <nav class="space-y-1">
                        <button onclick="switchTab('summary-type')" id="nav-summary-type" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-gray-500 hover:bg-gray-50">
                            <i data-lucide="tags" class="w-5 h-5"></i> สรุปตามประเภทงาน
                        </button>
                        <button onclick="switchTab('summary-customer')" id="nav-summary-customer" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-gray-500 hover:bg-gray-50">
                            <i data-lucide="building-2" class="w-5 h-5"></i> สรุปตามชื่อลูกค้า
                        </button>
                        <button onclick="switchTab('summary-user')" id="nav-summary-user" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-gray-500 hover:bg-gray-50">
                            <i data-lucide="users" class="w-5 h-5"></i> สรุปตามผู้รับผิดชอบ
                        </button>
                    </nav>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="flex-1 overflow-y-auto p-4 md:p-8 bg-[#f8f9fc]">
                <!-- Date Filter (Global) -->
                <div class="bg-white p-4 rounded-2xl shadow-sm border mb-6 flex flex-wrap items-center justify-between gap-4">
                    <div class="flex items-center gap-3">
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-bold text-gray-500">จาก:</span>
                            <input type="date" id="filter-start" class="border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary/20 outline-none">
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-bold text-gray-500">ถึง:</span>
                            <input type="date" id="filter-end" class="border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary/20 outline-none">
                        </div>
                        <button id="btn-refresh" class="bg-primary text-white p-2 rounded-lg hover:bg-secondary transition-colors">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="btn-export-excel" class="flex items-center gap-2 bg-emerald-50 text-emerald-700 px-4 py-2 rounded-xl text-sm font-bold hover:bg-emerald-100 transition-colors border border-emerald-100">
                            <i data-lucide="file-spreadsheet" class="w-4 h-4"></i> Excel
                        </button>
                    </div>
                </div>

                <!-- Content Views -->
                <div id="content-container">
                    <!-- Dashboard View -->
                    <div id="view-dashboard" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                <p class="text-gray-500 text-xs font-bold uppercase mb-1">งานทั้งหมด</p>
                                <h3 id="stat-total" class="text-3xl font-black text-gray-800">0</h3>
                            </div>
                            <div class="bg-blue-50 p-6 rounded-2xl shadow-sm border border-blue-100">
                                <p class="text-blue-600 text-xs font-bold uppercase mb-1">ประเภทงานสูงสุด</p>
                                <h3 id="stat-top-type" class="text-xl font-black text-blue-800 truncate">-</h3>
                            </div>
                            <div class="bg-purple-50 p-6 rounded-2xl shadow-sm border border-purple-100">
                                <p class="text-purple-600 text-xs font-bold uppercase mb-1">ลูกค้างานเยอะสุด</p>
                                <h3 id="stat-top-customer" class="text-xl font-black text-purple-800 truncate">-</h3>
                            </div>
                            <div class="bg-orange-50 p-6 rounded-2xl shadow-sm border border-orange-100">
                                <p class="text-orange-600 text-xs font-bold uppercase mb-1">ผู้ทำงานมากสุด</p>
                                <h3 id="stat-top-user" class="text-xl font-black text-orange-800 truncate">-</h3>
                            </div>
                        </div>
                        <div id="dashboard-recent" class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                            <div class="px-6 py-4 border-b flex justify-between items-center">
                                <h3 class="font-bold">รายการงานล่าสุด</h3>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left">
                                    <thead class="bg-gray-50 text-gray-500 text-[10px] uppercase font-black tracking-widest">
                                        <tr>
                                            <th class="px-6 py-3">วันที่</th>
                                            <th class="px-6 py-3">ลูกค้า</th>
                                            <th class="px-6 py-3">ประเภทงาน</th>
                                            <th class="px-6 py-3">ผู้รับผิดชอบ</th>
                                        </tr>
                                    </thead>
                                    <tbody id="table-recent" class="text-sm divide-y">
                                        <!-- Data rows here -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Generic Summary View (Used for Type, Customer, User) -->
                    <div id="view-summary" class="hidden space-y-6">
                        <div class="flex items-center gap-2 mb-4">
                            <h2 id="summary-title" class="text-2xl font-black text-gray-800">หัวข้อสรุป</h2>
                        </div>
                        <div id="summary-cards" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <!-- Summary Cards generated dynamically -->
                        </div>
                        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                            <div id="summary-table-container" class="overflow-x-auto">
                                <!-- Table generated dynamically -->
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, OAuthProvider, signInWithPopup, signInWithCustomToken, signInAnonymously, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global variables provided by environment
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let allTasks = [];
        let currentView = 'dashboard';

        // --- AUTHENTICATION ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    // Fallback to anonymous or wait for user action
                    // console.log("Waiting for user login...");
                }
            } catch (error) {
                console.error("Auth initialization failed:", error);
            }
        };

        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                
                // Update User UI
                if (user.displayName) {
                    document.getElementById('user-info').classList.remove('hidden');
                    document.getElementById('user-name').textContent = user.displayName;
                    document.getElementById('user-email').textContent = user.email;
                    document.getElementById('user-avatar').src = user.photoURL || 'https://ui-avatars.com/api/?name=' + user.displayName;
                }
                
                subscribeToData();
            } else {
                document.getElementById('view-login').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        // Login Actions
        document.getElementById('btn-login-google').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
        document.getElementById('btn-login-microsoft').onclick = () => signInWithPopup(auth, new OAuthProvider('microsoft.com'));
        document.getElementById('btn-logout').onclick = () => signOut(auth);

        // --- DATA MANAGEMENT ---
        function subscribeToData() {
            const dataPath = `/artifacts/${appId}/public/data/daily_tasks`;
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'daily_tasks');
            
            onSnapshot(q, (snapshot) => {
                allTasks = [];
                snapshot.forEach(doc => {
                    allTasks.push({ id: doc.id, ...doc.data() });
                });
                
                // Sort by date descending
                allTasks.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                processData();
            }, (error) => {
                console.error("Data fetch error:", error);
                // In production, show a non-alert message
            });
        }

        // --- NAVIGATION ---
        window.switchTab = (tabId) => {
            currentView = tabId;
            
            // Update Sidebar UI
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active-tab');
                btn.classList.add('text-gray-500', 'hover:bg-gray-50');
            });
            
            const activeNav = document.getElementById('nav-' + tabId);
            if (activeNav) {
                activeNav.classList.add('active-tab');
                activeNav.classList.remove('text-gray-500', 'hover:bg-gray-50');
            }

            // Toggle Views
            const dashboardView = document.getElementById('view-dashboard');
            const summaryView = document.getElementById('view-summary');

            if (tabId === 'dashboard') {
                dashboardView.classList.remove('hidden');
                summaryView.classList.add('hidden');
            } else {
                dashboardView.classList.add('hidden');
                summaryView.classList.remove('hidden');
                renderSummaryView(tabId);
            }
            
            processData(); // Refresh UI with current data
        };

        // --- CORE LOGIC & RENDERING ---
        function processData() {
            // Apply Date Filters
            const start = document.getElementById('filter-start').value;
            const end = document.getElementById('filter-end').value;
            
            let filtered = allTasks;
            if (start) filtered = filtered.filter(t => t.date >= start);
            if (end) filtered = filtered.filter(t => t.date <= end);

            // Dashboard Stats
            document.getElementById('stat-total').textContent = filtered.length;
            
            const types = countBy(filtered, 'taskType');
            const customers = countBy(filtered, 'customerName');
            const users = countBy(filtered, 'assignedTo');

            document.getElementById('stat-top-type').textContent = Object.keys(types)[0] || '-';
            document.getElementById('stat-top-customer').textContent = Object.keys(customers)[0] || '-';
            document.getElementById('stat-top-user').textContent = Object.keys(users)[0] || '-';

            // Recent Table
            const recentHtml = filtered.slice(0, 10).map(t => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-4 font-medium text-gray-900">${new Date(t.date).toLocaleDateString('th-TH')}</td>
                    <td class="px-6 py-4 text-gray-600">${t.customerName || '-'}</td>
                    <td class="px-6 py-4 text-primary font-bold">${t.taskType || '-'}</td>
                    <td class="px-6 py-4 text-gray-500">${t.assignedTo || '-'}</td>
                </tr>
            `).join('');
            document.getElementById('table-recent').innerHTML = recentHtml || '<tr><td colspan="4" class="px-6 py-10 text-center text-gray-400">ไม่มีข้อมูลในช่วงที่เลือก</td></tr>';

            // If we are in a summary view, refresh it
            if (currentView.startsWith('summary-')) {
                renderSummaryView(currentView, filtered);
            }
        }

        function renderSummaryView(viewId, filteredData = null) {
            const data = filteredData || allTasks; // Fallback if no filtered data passed
            const cardsContainer = document.getElementById('summary-cards');
            const tableContainer = document.getElementById('summary-table-container');
            const titleElement = document.getElementById('summary-title');
            
            let groupingKey = '';
            let titlePrefix = '';
            
            if (viewId === 'summary-type') {
                groupingKey = 'taskType';
                titlePrefix = 'สรุปตามประเภทงาน';
            } else if (viewId === 'summary-customer') {
                groupingKey = 'customerName';
                titlePrefix = 'สรุปตามชื่อลูกค้า';
            } else if (viewId === 'summary-user') {
                groupingKey = 'assignedTo';
                titlePrefix = 'สรุปตามผู้รับผิดชอบ';
            }

            titleElement.innerText = titlePrefix;

            // Calculate Grouped Data
            const grouped = {};
            data.forEach(t => {
                const val = t[groupingKey] || 'ไม่ระบุ';
                if (!grouped[val]) grouped[val] = [];
                grouped[val].push(t);
            });

            // Sort grouped by count
            const sortedKeys = Object.keys(grouped).sort((a, b) => grouped[b].length - grouped[a].length);

            // Render Cards (Top 3)
            const cardsHtml = sortedKeys.slice(0, 3).map((key, i) => `
                <div class="bg-white p-6 rounded-2xl border-2 ${i === 0 ? 'border-primary' : 'border-gray-50'} shadow-sm relative overflow-hidden">
                    ${i === 0 ? '<div class="absolute top-0 right-0 bg-primary text-white text-[10px] px-3 py-1 font-black rounded-bl-lg">อันดับ 1</div>' : ''}
                    <p class="text-gray-500 text-xs font-bold uppercase mb-1 truncate">${key}</p>
                    <div class="flex items-baseline gap-2">
                        <span class="text-4xl font-black text-gray-800">${grouped[key].length}</span>
                        <span class="text-gray-400 font-bold text-sm">งาน</span>
                    </div>
                </div>
            `).join('');
            cardsContainer.innerHTML = cardsHtml;

            // Render Full Table
            let tableHtml = `
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-500 text-[10px] uppercase font-black tracking-widest">
                        <tr>
                            <th class="px-6 py-4">${titlePrefix.replace('สรุปตาม', '')}</th>
                            <th class="px-6 py-4 text-center">จำนวนงาน</th>
                            <th class="px-6 py-4 text-center">สัดส่วน</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y">
            `;

            sortedKeys.forEach(key => {
                const count = grouped[key].length;
                const percent = Math.round((count / data.length) * 100);
                tableHtml += `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 font-bold text-gray-700">${key}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="bg-gray-100 text-gray-700 px-3 py-1 rounded-full text-xs font-black">${count}</span>
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-3">
                                <div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
                                    <div class="h-full bg-primary" style="width: ${percent}%"></div>
                                </div>
                                <span class="text-xs font-bold text-gray-500">${percent}%</span>
                            </div>
                        </td>
                    </tr>
                `;
            });

            tableHtml += `</tbody></table>`;
            tableContainer.innerHTML = tableHtml;
        }

        // Helper: Count By
        function countBy(arr, key) {
            const counts = {};
            arr.forEach(item => {
                const val = item[key] || 'ไม่ระบุ';
                counts[val] = (counts[val] || 0) + 1;
            });
            return Object.fromEntries(Object.entries(counts).sort((a, b) => b[1] - a[1]));
        }

        // --- EXPORT ---
        document.getElementById('btn-export-excel').onclick = () => {
            const start = document.getElementById('filter-start').value || 'all';
            const end = document.getElementById('filter-end').value || 'all';
            const worksheet = XLSX.utils.json_to_sheet(allTasks);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Tasks");
            XLSX.writeFile(workbook, `DailyTasks_${start}_to_${end}.xlsx`);
        };

        // Initialize Icons
        lucide.createIcons();

        // Set default dates to current month
        const today = new Date();
        const firstDay = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
        const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0).toISOString().split('T')[0];
        document.getElementById('filter-start').value = firstDay;
        document.getElementById('filter-end').value = lastDay;

        document.getElementById('btn-refresh').onclick = processData;
    </script>
</body>
</html>
